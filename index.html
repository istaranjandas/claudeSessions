<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Claude Dashboard</title>
<meta name="theme-color" content="#0b0b11">
<meta name="description" content="A private, in-browser dashboard for your Claude Code transcripts.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23818cf8'/%3E%3Cstop offset='1' stop-color='%23c4b5fd'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cg fill='%23fff' transform='translate(16 16)'%3E%3Cpath d='M0 -10C1.5 -6 1.5 -2 0 0C-1.5 -2 -1.5 -6 0 -10Z'/%3E%3Cpath d='M0 -10C1.5 -6 1.5 -2 0 0C-1.5 -2 -1.5 -6 0 -10Z' transform='rotate(90)'/%3E%3Cpath d='M0 -10C1.5 -6 1.5 -2 0 0C-1.5 -2 -1.5 -6 0 -10Z' transform='rotate(180)'/%3E%3Cpath d='M0 -10C1.5 -6 1.5 -2 0 0C-1.5 -2 -1.5 -6 0 -10Z' transform='rotate(270)'/%3E%3Cpath d='M0 -7C1.1 -4 1.1 -1.5 0 0C-1.1 -1.5 -1.1 -4 0 -7Z' transform='rotate(45)'/%3E%3Cpath d='M0 -7C1.1 -4 1.1 -1.5 0 0C-1.1 -1.5 -1.1 -4 0 -7Z' transform='rotate(135)'/%3E%3Cpath d='M0 -7C1.1 -4 1.1 -1.5 0 0C-1.1 -1.5 -1.1 -4 0 -7Z' transform='rotate(225)'/%3E%3Cpath d='M0 -7C1.1 -4 1.1 -1.5 0 0C-1.1 -1.5 -1.1 -4 0 -7Z' transform='rotate(315)'/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lunr@2.3.9/lunr.min.js"></script>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="app-header">
  <div class="inner">
    <a href="#/" class="brand">
      <span class="brand-dot"></span>
      <span>Claude Dashboard</span>
    </a>
    <nav class="nav-tabs">
      <a href="#/" class="nav-tab" data-route="">Stats</a>
      <a href="#/projects" class="nav-tab" data-route="projects">Projects</a>
      <a href="#/history" class="nav-tab" data-route="history">History</a>
      <a href="#/search" class="nav-tab" data-route="search">Search</a>
    </nav>
    <div class="ml-auto flex items-center gap-2">
      <span id="manifest-meta" class="meta-chip hidden md:inline-flex"></span>
      <button id="search-shortcut" class="btn btn-sm hidden md:inline-flex" title="Jump to search (press /)">
        <span style="opacity:0.7">Search</span><span class="kbd">/</span>
      </button>
      <button id="shortcuts-btn" class="btn btn-sm" title="Keyboard shortcuts (?)">
        <span class="kbd" style="margin:0">?</span>
      </button>
      <button id="refresh-btn" class="btn btn-sm" title="Open folder">
        <span style="font-size:14px;line-height:1">⌂</span><span class="hidden sm:inline">Open folder</span>
      </button>
    </div>
  </div>
</header>
<main id="app"></main>
<div id="toast" class="toast hidden"></div>
<div id="modal-root"></div>
<script src="core.js"></script>
<script src="app.js"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
